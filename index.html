<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Surprise ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:linear-gradient(270deg,#ffd1dc,#ff8fab,#ff4d6d,#ff8fab);
  background-size:400% 400%;
  animation:bgMove 18s ease infinite;
  overflow:hidden;
  text-align:center;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* teddy start */
.teddy-start{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:64px;
  background:none;
  border:none;
  cursor:pointer;
  animation:teddyBounce 1.6s infinite;
  transition:.2s;
}

.teddy-start:active{
  transform:scale(1.2);
}

@keyframes teddyBounce{
  0%{transform:translateY(0);}
  50%{transform:translateY(-14px);}
  100%{transform:translateY(0);}
}

/* popup */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.popup-box{
  background:white;
  padding:24px;
  border-radius:20px;
  max-width:360px;
  width:100%;
  box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.popup-msg{
  font-size:1.15em;
  margin-bottom:20px;
}

.btn-row{
  display:flex;
  gap:16px;
  justify-content:center;
  position:relative;
}

.yes-btn, .no-btn, .music-btn{
  border:none;
  padding:12px 24px;
  border-radius:26px;
  font-size:1em;
  box-shadow:0 8px 18px rgba(0,0,0,.2);
  transition:.15s;
}

.yes-btn{ background:#e03131; color:white; }
.no-btn{ background:#adb5bd; color:white; position:relative; }
.music-btn{
  position:fixed;
  top:14px;
  right:14px;
  background:#00000055;
  color:white;
  padding:10px 12px;
  border-radius:50%;
}

/* reveal box with glow */
.reveal-box{
  width:320px;
  height:360px;
  margin:60px auto;
  border-radius:22px;
  overflow:hidden;
  display:none;
  background:#fff0f3;
  animation:glow 2.5s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #ff8fab;}
  to{box-shadow:0 0 28px #ff4d6d;}
}

.reveal-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .8s, transform .8s;
}

.reveal-box img.show{
  opacity:1;
  transform:scale(1.05);
}

/* final message card */
.final-card{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.final-box{
  background:white;
  border-radius:20px;
  padding:26px;
  max-width:420px;
  box-shadow:0 20px 50px rgba(0,0,0,.3);
  font-size:1.1em;
  line-height:1.5;
}

/* floating hearts */
.heart{
  position:fixed;
  bottom:-10px;
  animation:floatUp linear forwards;
}

@keyframes floatUp{
  to{
    transform:translateY(-110vh) rotate(360deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<button class="music-btn" onclick="toggleMusic()" id="musicBtn">🔊</button>

<button class="teddy-start" id="startBtn" onclick="openChoice(); teddyBurst()">🧸</button>

<div class="popup" id="popup">
  <div class="popup-box">
    <div class="popup-msg">
      wanna see something more beautiful than flowers
    </div>
    <div class="btn-row">
      <button class="yes-btn" onclick="startReveal()">Yes</button>
      <button class="no-btn" id="noBtn"
        onmouseover="runNo()" onclick="shrinkNo()">No</button>
    </div>
  </div>
</div>

<div class="reveal-box" id="revealBox">
  <img id="p0" src="photo1.jpg">
  <img id="p1" src="photo2.jpg">
  <img id="p2" src="photo3.jpg">
  <img id="p3" src="photo4.jpg">
</div>

<div class="final-card" id="finalCard">
  <div class="final-box">
    just seeing you smile is enough to cure all fatigue and tension so,
    be happy and beautiful my iternal medicine of happiness ❤️
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="ChaarKadam.mp3" type="audio/mpeg">
</audio>

<script>
const photos=[
  document.getElementById("p0"),
  document.getElementById("p1"),
  document.getElementById("p2"),
  document.getElementById("p3")
];

let noScale=1;
let musicOn=false;

function teddyBurst(){
  for(let i=0;i<8;i++){
    spawnHeart(window.innerWidth/2);
  }
}

function openChoice(){
  document.getElementById("startBtn").style.display="none";
  document.getElementById("popup").style.display="flex";
}

function runNo(){
  const n=document.getElementById("noBtn");
  n.style.position="absolute";
  n.style.left=Math.random()*120-60+"px";
  n.style.top=Math.random()*40-20+"px";
}

function shrinkNo(){
  const n=document.getElementById("noBtn");
  noScale*=0.7;
  n.style.transform="scale("+noScale+")";
  if(noScale<0.2){
    n.style.opacity=0;
    n.style.pointerEvents="none";
  }
}

function startReveal(){
  document.getElementById("popup").style.display="none";
  const box=document.getElementById("revealBox");
  box.style.display="block";
  startMusic();
  confettiBurst();

  let i=0;
  const interval=setInterval(()=>{
    photos.forEach(p=>p.classList.remove("show"));
    photos[i].classList.add("show");
    i++;
    if(i===photos.length){
      clearInterval(interval);
      setTimeout(()=>{
        document.getElementById("finalCard").style.display="flex";
      },1800);
    }
  },2000);
}

function confettiBurst(){
  for(let i=0;i<25;i++){
    spawnHeart(Math.random()*window.innerWidth);
  }
}

function spawnHeart(x){
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=x+"px";
  h.style.fontSize=(14+Math.random()*24)+"px";
  h.style.animationDuration=(5+Math.random()*3)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),9000);
}

setInterval(()=>spawnHeart(Math.random()*window.innerWidth),500);

function startMusic(){
  const m=document.getElementById("bgMusic");
  if(musicOn) return;
  musicOn=true;
  m.volume=0;
  m.play().catch(()=>{});
  let v=0;
  const f=setInterval(()=>{
    if(v<0.5){v+=0.01;m.volume=v;}
    else clearInterval(f);
  },200);
}

function toggleMusic(){
  const m=document.getElementById("bgMusic");
  const b=document.getElementById("musicBtn");
  if(m.paused){ m.play(); b.innerHTML="🔊"; }
  else { m.pause(); b.innerHTML="🔇"; }
}
</script>

</body>
</html>
