<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Love Game</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#ffd93d,#ff6b6b,#ff8fab,#ffd93d);
background-size:400% 400%;
animation:bg 12s ease infinite;
overflow:hidden;
text-align:center;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* teddy */

.teddy{
position:absolute;
top:30%;
left:-120px;
font-size:95px;
animation:walk 2.5s forwards;
}

@keyframes walk{
to{left:50%; transform:translateX(-50%);}
}

.teddy.idle{
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translate(-50%,0)}
50%{transform:translate(-50%,-15px)}
100%{transform:translate(-50%,0)}
}

/* eyes looking */

.eyes{
position:absolute;
top:-10px;
left:35px;
font-size:18px;
}

/* message */

.message{
position:absolute;
top:58%;
left:50%;
transform:translateX(-50%);
font-size:20px;
font-weight:600;
width:85%;
max-width:360px;
min-height:60px;
}

/* buttons */

.buttons{
margin-top:20px;
}

.btn{
padding:12px 28px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.yes{
background:#ff4d6d;
color:white;
}

.no{
background:#adb5bd;
color:white;
margin-left:15px;
position:absolute;
}

/* celebration */

.celebration{
display:none;
position:fixed;
inset:0;
background:linear-gradient(135deg,#ff6b6b,#ffd93d,#ffe066);
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:35px;
border-radius:22px;
max-width:420px;
font-size:20px;
box-shadow:0 25px 50px rgba(0,0,0,.3);
}

/* hearts */

.heart{
position:fixed;
font-size:22px;
animation:float 4s linear forwards;
}

@keyframes float{
to{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* confetti */

.confetti{
position:fixed;
top:-20px;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="teddy" id="teddy">🧸</div>

<div class="message" id="msg"></div>

<div class="buttons" id="buttons" style="display:none">
<button class="btn yes" id="yesBtn" onclick="yesAction()">Yes</button>
<button class="btn no" id="noBtn">No</button>
</div>

<div class="celebration" id="celebration">
<div class="box">
🎉 I knew it, no matter what anyone say  
I am here, and you did great,  
no doubt about it
</div>
</div>

<script>

/* typing message */

const text="what you doing my sweety, are you missing me"
let i=0

function type(){

if(i<text.length){
document.getElementById("msg").innerHTML+=text.charAt(i)
i++
setTimeout(type,60)
}
else{
document.getElementById("buttons").style.display="block"
}

}

/* teddy animation start */

setTimeout(()=>{
document.getElementById("teddy").classList.add("idle")
type()
},2500)

/* NO button runs away */

const noBtn=document.getElementById("noBtn")

function moveNo(){

noBtn.style.left=Math.random()*80+"vw"
noBtn.style.top=Math.random()*70+"vh"

}

noBtn.addEventListener("mouseover",moveNo)
noBtn.addEventListener("touchstart",moveNo)

/* hearts */

function heartBurst(){

for(let i=0;i<20;i++){

const h=document.createElement("div")

h.className="heart"

h.innerHTML="❤️"

h.style.left=Math.random()*100+"vw"

h.style.bottom="0"

document.body.appendChild(h)

setTimeout(()=>h.remove(),4000)

}

}

/* confetti */

function confettiExplosion(){

for(let i=0;i<100;i++){

const c=document.createElement("div")

c.className="confetti"

const emojis=["🎉","🎊","✨","💛","⭐"]

c.innerHTML=emojis[Math.floor(Math.random()*emojis.length)]

c.style.left=Math.random()*100+"vw"

c.style.animationDuration=(3+Math.random()*3)+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),6000)

}

}

/* yes */

function yesAction(){

heartBurst()

setTimeout(()=>{

document.getElementById("msg").style.display="none"
document.getElementById("buttons").style.display="none"
document.getElementById("teddy").style.display="none"

document.getElementById("celebration").style.display="flex"

confettiExplosion()

},700)

}

</script>

</body>
</html>
