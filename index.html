<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Teddy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:linear-gradient(270deg,#ffd1dc,#ff8fab,#ff4d6d,#ff8fab);
  background-size:400% 400%;
  animation:bgMove 18s ease infinite;
  overflow:hidden;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* teddy start */
.teddy-start{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:72px;
  background:none;
  border:none;
  cursor:pointer;
  animation:bounce 1.6s infinite;
}

@keyframes bounce{
  0%{transform:translateY(0);}
  50%{transform:translateY(-16px);}
  100%{transform:translateY(0);}
}

/* popup */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.popup-box{
  background:white;
  padding:26px;
  border-radius:22px;
  max-width:360px;
  width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
  position:relative;
  text-align:center;
}

.popup-emoji{
  font-size:48px;
  margin-bottom:10px;
}

.popup-msg{
  font-size:1.2em;
  margin-bottom:22px;
}

.yes-btn, .no-btn{
  border:none;
  padding:12px 26px;
  border-radius:26px;
  font-size:1em;
  box-shadow:0 8px 18px rgba(0,0,0,.2);
  position:absolute;
}

.yes-btn{
  background:#e03131;
  color:white;
  left:30px;
  bottom:18px;
}

.no-btn{
  background:#adb5bd;
  color:white;
  right:30px;
  bottom:18px;
}

/* FULL SCREEN PHOTO VIEW */
.reveal-box{
  position:fixed;
  inset:0;
  display:none;
  background:black;
}

.reveal-box img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity .8s, transform .8s;
}

.reveal-box img.show{
  opacity:1;
  transform:scale(1.04);
}

/* final message */
.final-card{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:rgba(0,0,0,.35);
}

.final-box{
  background:white;
  border-radius:20px;
  padding:26px;
  max-width:420px;
  box-shadow:0 20px 50px rgba(0,0,0,.3);
  font-size:1.1em;
  line-height:1.5;
  text-align:center;
}
</style>
</head>

<body>

<!-- ONLY TEDDY (no heart beside it) -->
<button class="teddy-start" id="startBtn" onclick="openChoice()">🧸</button>

<div class="popup" id="popup">
  <div class="popup-box" id="popupBox">
    <div class="popup-emoji">🧸</div>
    <div class="popup-msg">Hrudya say yes or no</div>
    <button class="yes-btn" onclick="startReveal()">Yes</button>
    <button class="no-btn" id="noBtn">No</button>
  </div>
</div>

<!-- FULLSCREEN IMAGES -->
<div class="reveal-box" id="revealBox">
  <img id="p0" src="photo1.jpg">
  <img id="p1" src="photo2.jpg">
  <img id="p2" src="photo3.jpg">
  <img id="p3" src="photo4.jpg">
</div>

<div class="final-card" id="finalCard">
  <div class="final-box">
    just seeing you smile is enough to cure all fatigue and tension so,
    be happy and beautiful my iternal medicine of happiness
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="ChaarKadam.mp3" type="audio/mpeg">
</audio>

<script>
const photos=[
  document.getElementById("p0"),
  document.getElementById("p1"),
  document.getElementById("p2"),
  document.getElementById("p3")
];

function openChoice(){
  document.getElementById("startBtn").style.display="none";
  document.getElementById("popup").style.display="flex";
}

/* running NO button */
const noBtn=document.getElementById("noBtn");
const box=document.getElementById("popupBox");

function moveNo(){
  const bw=box.clientWidth-100;
  const bh=box.clientHeight-80;
  noBtn.style.left=Math.random()*bw+"px";
  noBtn.style.top=Math.random()*bh+"px";
  noBtn.style.right="auto";
  noBtn.style.bottom="auto";
}

noBtn.addEventListener("mouseover",moveNo);
noBtn.addEventListener("touchstart",moveNo);

/* reveal sequence only after YES */
function startReveal(){
  document.getElementById("popup").style.display="none";
  const rb=document.getElementById("revealBox");
  rb.style.display="block";
  startMusic();

  let i=0;
  const interval=setInterval(()=>{
    photos.forEach(p=>p.classList.remove("show"));
    photos[i].classList.add("show");
    i++;
    if(i===photos.length){
      clearInterval(interval);
      setTimeout(()=>{
        document.getElementById("finalCard").style.display="flex";
      },1800);
    }
  },2000);
}

function startMusic(){
  const m=document.getElementById("bgMusic");
  m.volume=0;
  m.play().catch(()=>{});
  let v=0;
  const f=setInterval(()=>{
    if(v<0.5){v+=0.01;m.volume=v;}
    else clearInterval(f);
  },200);
}
</script>

</body>
</html>
